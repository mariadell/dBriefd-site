<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — dBriefd</title>
  <meta name="description" content="Contact dBriefd. App developer Marija Bajdevska. Get in touch for support, feedback, or inquiries." />
  <link rel="canonical" href="https://dbriefd.app/contact/" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0B;
      --bg2: #111113;
      --white: #EEEEE8;
      --gold: #E6B332;
      --muted: #5a5a60;
      --border: rgba(238,238,232,.08);
      --font-mono: 'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-mono);
      font-size: .7rem;
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      padding: 4rem 1.25rem 3rem;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 560px; margin: 0 auto; }
    .back { display: inline-block; margin-bottom: 2rem; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .back:hover { color: var(--gold); text-decoration: none; }
    h1 { font-size: .85rem; font-weight: 400; color: var(--gold); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 1.5rem; }
    .contact-lead { margin-bottom: 1.5rem; color: var(--muted); }
    .contact-row { margin-bottom: .6rem; color: var(--muted); }
    .contact-row strong { color: var(--white); font-weight: 400; margin-right: .5rem; }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back">← Back</a>
    <h1>Contact</h1>
    <p class="contact-lead">dBriefd is developed and operated by Marija Bajdevska. For support, feedback, or any inquiries, please reach out:</p>
    <p class="contact-row"><strong>App:</strong> dBriefd</p>
    <p class="contact-row"><strong>Developer:</strong> Marija Bajdevska</p>
    <p class="contact-row"><strong>Email:</strong> <a href="mailto:contact@dbriefd.app">contact@dbriefd.app</a></p>
  </div>
</body>
</html>
